    function openDb() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);

        request.onupgradeneeded = () => {
          const database = request.result;
          if (!database.objectStoreNames.contains(STORE_NAME)) {
            database.createObjectStore(STORE_NAME, { keyPath: "id" });
          }
        };

        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    }

    function dbPut(item) {
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, "readwrite");
        const store = tx.objectStore(STORE_NAME);
        store.put(item);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    }

    function dbDelete(id) {
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, "readwrite");
        const store = tx.objectStore(STORE_NAME);
        store.delete(id);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    }

    function dbGetAll() {
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, "readonly");
        const store = tx.objectStore(STORE_NAME);
        const request = store.getAll();
        request.onsuccess = () => resolve(request.result || []);
        request.onerror = () => reject(request.error);
      });
    }

    async function initDb() {
      if (!("indexedDB" in window)) {
        setStatus("IndexedDB desteklenmiyor. Kalıcı galeri çalışmayabilir.");
        return;
      }

      db = await openDb();
      const savedItems = await dbGetAll();
      savedItems.sort((a, b) => b.createdAt - a.createdAt);

      for (const saved of savedItems) {
        const item = {
          ...saved,
          selected: false,
          visible: true,
          objectUrl: URL.createObjectURL(saved.blob)
        };
        galleryItems.push(item);
      }

      renderGallery();

      if (galleryItems.length) {
        showLastCapturePreview(galleryItems[0]);
      }

      updateGalleryUi();
      if (savedItems.length) {
        updateDiagnosticStatus(`${savedItems.length} kayıtlı foto yüklendi.`);
      }
    }

    async function requestCameraPermission() {
      if (permissionGranted) return;

      if (!navigator.mediaDevices?.getUserMedia) {
        throw new Error("Tarayıcı kamera erişimini desteklemiyor.");
      }

      const tempStream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: "environment" } },
        audio: false
      });

      tempStream.getTracks().forEach(track => track.stop());
      permissionGranted = true;
    }

    async function requestSensorPermissionFromGesture() {
      if (sensorPermissionGranted) return;

      if (!window.isSecureContext) {
        throw new Error("Sensör için HTTPS gerekli.");
      }

      const hasOrientationApi = typeof DeviceOrientationEvent !== "undefined";
      const hasMotionApi = typeof DeviceMotionEvent !== "undefined";

      if (!hasOrientationApi && !hasMotionApi) {
        throw new Error("Bu cihaz/tarayıcı sensör API desteklemiyor.");
      }

      if (hasOrientationApi && typeof DeviceOrientationEvent.requestPermission === "function") {
        const orientationResult = await DeviceOrientationEvent.requestPermission();
        if (orientationResult !== "granted") {
          throw new Error("Orientation izni verilmedi.");
        }
      }

      if (hasMotionApi && typeof DeviceMotionEvent.requestPermission === "function") {
        const motionResult = await DeviceMotionEvent.requestPermission();
        if (motionResult !== "granted") {
          throw new Error("Motion izni verilmedi.");
        }
      }

      if (!orientationListening && hasOrientationApi) {
        window.addEventListener("deviceorientation", handleDeviceOrientation, true);
        orientationListening = true;
      }

      if (!motionListening && hasMotionApi) {
        window.addEventListener("devicemotion", handleDeviceMotion, true);
        motionListening = true;
      }

      sensorPermissionGranted = true;
      sensorFailureShown = false;
    }

    async function populateDevices() {
      const devices = await navigator.mediaDevices.enumerateDevices();
      const videoInputs = devices.filter(device => device.kind === "videoinput");
      const previous = videoDeviceEl.value;

      videoDeviceEl.innerHTML = "";

      if (!videoInputs.length) {
        throw new Error("Kamera bulunamadı.");
      }

      for (const device of videoInputs) {
        const option = document.createElement("option");
        option.value = device.deviceId;
        option.textContent = device.label?.trim() || `Kamera ${videoDeviceEl.options.length + 1}`;
        videoDeviceEl.appendChild(option);
      }

      const ultraWideIndex = videoInputs.findIndex(item => /ultra|0\.5|0,5|wide/i.test(item.label || ""));
      const backIndex = videoInputs.findIndex(item => /triple|arka|back|rear/i.test(item.label || ""));
      const previousIndex = videoInputs.findIndex(item => item.deviceId === previous);

      videoDeviceEl.selectedIndex =
        previousIndex >= 0 ? previousIndex :
        ultraWideIndex >= 0 ? ultraWideIndex :
        backIndex >= 0 ? backIndex :
        0;
    }

    function waitForVideoReady(video) {
      return new Promise((resolve, reject) => {
        const timeout = setTimeout(() => reject(new Error("Video hazır olmadı.")), 5000);
        video.addEventListener("loadedmetadata", () => {
          clearTimeout(timeout);
          resolve();
        }, { once: true });
      });
    }

    async function detectTorchSupport(track) {
      torchSupported = false;
      torchEnabled = false;

      if (!track?.getCapabilities) {
        updateTorchUi();
        return;
      }

      const caps = track.getCapabilities();
      torchSupported = Boolean(caps?.torch);
      updateTorchUi();
    }

    async function startSelectedCamera() {
      const deviceId = videoDeviceEl.value;
      if (!deviceId) {
        throw new Error("Önce kamera seç.");
      }

      cleanupStream();

      const stream = await navigator.mediaDevices.getUserMedia({
        audio: false,
        video: {
          deviceId: { exact: deviceId },
          width: { ideal: 3840, max: 4096 },
          height: { ideal: 2160, max: 2160 },
          frameRate: { ideal: 30, max: 60 }
        }
      });

      currentStream = stream;
      currentTrack = stream.getVideoTracks()[0];
      videoEl.srcObject = stream;

      currentTrack.addEventListener("ended", () => {
        cleanupStream();
        updateUiState();
        setStatus("Kamera akışı sona erdi.");
      });

      await waitForVideoReady(videoEl);
      await videoEl.play();
      await detectTorchSupport(currentTrack);

      const settings = currentTrack.getSettings?.() || {};
      captureResolutionText = `${settings.width || videoEl.videoWidth || "-"}x${settings.height || videoEl.videoHeight || "-"}${settings.frameRate ? ` • ${Math.round(settings.frameRate)}fps` : ""}`;

      updateUiState();
      resizeOverlayCanvas();
      drawOverlay();
      updateDiagnosticStatus("Kamera açıldı.");
    }

    async function toggleTorch() {
      if (!currentTrack || !torchSupported) return;

      const nextState = !torchEnabled;
      await currentTrack.applyConstraints({ advanced: [{ torch: nextState }] });

      torchEnabled = nextState;
      updateTorchUi();
      updateDiagnosticStatus(torchEnabled ? "Torch açıldı." : "Torch kapatıldı.");
    }

    function getScreenAngle() {
      if (screen.orientation && typeof screen.orientation.angle === "number") {
        return screen.orientation.angle;
      }
      if (typeof window.orientation === "number") {
        return window.orientation;
      }
      return 0;
    }

    function computeRollFromGravity(x, y) {
      const screenAngle = getScreenAngle();
      let gx = x;
      let gy = y;

      if (screenAngle === 90) {
        gx = -y;
        gy = x;
      } else if (screenAngle === -90 || screenAngle === 270) {
        gx = y;
        gy = -x;
      } else if (screenAngle === 180) {
        gx = -x;
        gy = -y;
      }

      return Math.atan2(gx, -gy) * 180 / Math.PI;
    }

    function computeRollFromOrientation(beta, gamma) {
      const screenAngle = getScreenAngle();
      if (screenAngle === 90) return beta;
      if (screenAngle === -90 || screenAngle === 270) return -beta;
      if (screenAngle === 180) return -gamma;
      return gamma;
    }

    function recordSensorHit(source) {
      sensorSource = source;
      lastSensorAt = Date.now();
      eventCount += 1;
      sensorFailureShown = false;
      updateStatePills();
    }

    function handleDeviceOrientation(event) {
      if (!Number.isFinite(event.beta) || !Number.isFinite(event.gamma)) return;

      lastBeta = event.beta;
      lastGamma = event.gamma;

      const nextRoll = computeRollFromOrientation(event.beta, event.gamma);
      rawRollDeg = smoothAngleDeg(rawRollDeg, nextRoll, ANGLE_SMOOTH_ALPHA);

      lastOrientationAt = Date.now();
      recordSensorHit("orientation");

      if (eventCount % 5 === 0) {
        updateDiagnosticStatus();
      }
    }

    function handleDeviceMotion(event) {
      const g = event.accelerationIncludingGravity;
      if (!g) return;

      lastGX = Number.isFinite(g.x) ? g.x : 0;
      lastGY = Number.isFinite(g.y) ? g.y : 0;
      lastGZ = Number.isFinite(g.z) ? g.z : 0;

      gravityX += LOW_PASS_ALPHA * (lastGX - gravityX);
      gravityY += LOW_PASS_ALPHA * (lastGY - gravityY);
      gravityZ += LOW_PASS_ALPHA * (lastGZ - gravityZ);

      const magnitude = Math.abs(gravityX) + Math.abs(gravityY) + Math.abs(gravityZ);
      if (magnitude < 0.2) return;

      const orientationFresh = Date.now() - lastOrientationAt < SENSOR_TIMEOUT_MS;
      if (!orientationFresh) {
        const nextRoll = computeRollFromGravity(gravityX, gravityY);
        rawRollDeg = smoothAngleDeg(rawRollDeg, nextRoll, ANGLE_SMOOTH_ALPHA);
        recordSensorHit("motion");
      }

      lastMotionAt = Date.now();

      if (eventCount % 5 === 0) {
        updateDiagnosticStatus();
      }
    }

    function startSensorWatchdog() {
      if (sensorWatchdogId !== null) {
        clearInterval(sensorWatchdogId);
      }

      sensorWatchdogId = window.setInterval(() => {
        if (!sensorPermissionGranted) return;

        const now = Date.now();
        const hasRecentSensor = now - lastSensorAt < SENSOR_TIMEOUT_MS;

        if (hasRecentSensor || sensorFailureShown) return;

        sensorFailureShown = true;
        sensorSource = "none";
        updateStatePills();

        setStatus(
          [
            "Sensör verisi gelmiyor.",
            "1) HTTPS gerekli",
            "2) iPhone/Safari ise Motion & Orientation Access aç",
            "3) WebView/iframe sensör engelliyor olabilir",
            "4) Masaüstünde sensör olmayabilir"
          ].join("\n")
        );
      }, 1000);
    }

    function resizeOverlayCanvas() {
      const rect = overlayCanvasEl.getBoundingClientRect();
      const ratio = window.devicePixelRatio || 1;
      const width = Math.max(1, Math.round(rect.width * ratio));
      const height = Math.max(1, Math.round(rect.height * ratio));

      if (overlayCanvasEl.width !== width || overlayCanvasEl.height !== height) {
        overlayCanvasEl.width = width;
        overlayCanvasEl.height = height;
      }
    }

    function drawText(ctx, text, x, y, options = {}) {
      const {
        font = "600 14px -apple-system, BlinkMacSystemFont, Segoe UI, Arial",
        fillStyle = "rgba(255,255,255,0.92)",
        align = "center",
        baseline = "middle",
        shadow = true
      } = options;

      ctx.save();
      ctx.font = font;
      ctx.fillStyle = fillStyle;
      ctx.textAlign = align;
      ctx.textBaseline = baseline;

      if (shadow) {
        ctx.shadowColor = "rgba(0,0,0,0.75)";
        ctx.shadowBlur = 8;
      }

      ctx.fillText(text, x, y);
      ctx.restore();
    }

    function drawMetadataOnContext(ctx, width, height) {
      const target = getTargetAngle();
      const now = Date.now();
      const compactRefractive = `${sphInputEl.value.trim() || "-"} / ${cylInputEl.value.trim() || "-"} / ${String(clampAxis180(axlInputEl.value || 0)).padStart(3, "0")}°`;

      const lines = [
        `İsim: ${patientNameInputEl.value.trim() || "-"}`,
        `IOL: ${iolTypeInputEl.value.trim() || "-"}`,
        `Sph/Cyl/Axl: ${compactRefractive}`,
        `Hedef: ${String(target).padStart(3, "0")}°`,
        `Tilt: ${formatSignedAngle(getCurrentRollDeg())}`,
        `Tarih: ${formatDateTime(now)}`
      ];

      const padding = Math.round(width * 0.020);
      const boxWidth = Math.round(width * 0.54);
      const lineHeight = Math.max(22, Math.round(height * 0.025));
      const boxHeight = padding * 2 + lines.length * lineHeight;

      ctx.save();
      ctx.fillStyle = "rgba(0,0,0,0.34)";
      ctx.fillRect(padding, height - boxHeight - padding, boxWidth, boxHeight);
      ctx.strokeStyle = "rgba(255,255,255,0.18)";
      ctx.lineWidth = 2;
      ctx.strokeRect(padding, height - boxHeight - padding, boxWidth, boxHeight);

      lines.forEach((line, index) => {
        drawText(
          ctx,
          line,
          padding + 14,
          height - boxHeight - padding + padding + index * lineHeight + lineHeight / 2,
          {
            font: `700 ${Math.max(14, Math.round(height * 0.016))}px -apple-system, BlinkMacSystemFont, Segoe UI, Arial`,
            fillStyle: "rgba(255,255,255,0.96)",
            align: "left",
            baseline: "middle"
          }
        );
      });

      ctx.restore();
    }

    function drawOverlayOnContext(ctx, width, height, rollDeg, targetDeg) {
      if (!ctx) return null;

      ctx.clearRect(0, 0, width, height);

      const cx = width / 2;
      const cy = height / 2;
      const radius = Math.min(width, height) * 0.33;

      const outerRingRadius = radius;
      const innerNumberRingRadius = radius * 0.74;
      const reciprocalLabelRadius = (outerRingRadius + innerNumberRingRadius) * 0.5;

      const innerActiveRadius = outerRingRadius * 0.72;
      const outerActiveRadius = outerRingRadius * 1.03;
      const halfLineWidth = radius * 1.14;

      const normalizedRollAxis = ((rollDeg % 180) + 180) % 180;
      const diffToTarget = getAxisDiffDeg(normalizedRollAxis, targetDeg);
      const isNearTarget = diffToTarget <= 3;
      const targetStroke = isNearTarget ? "rgba(88,211,141,0.98)" : "rgba(77,163,255,0.98)";
      const targetGlow = isNearTarget ? "rgba(88,211,141,0.18)" : "rgba(77,163,255,0.18)";

      ctx.save();
      ctx.translate(cx, cy);

      ctx.beginPath();
      ctx.arc(0, 0, outerRingRadius, 0, Math.PI * 2);
      ctx.lineWidth = Math.max(2.5, outerRingRadius * 0.0115);
      ctx.strokeStyle = "rgba(255,255,255,0.50)";
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(0, 0, innerNumberRingRadius, 0, Math.PI * 2);
      ctx.lineWidth = Math.max(1.9, outerRingRadius * 0.0075);
      ctx.strokeStyle = "rgba(190,210,235,0.38)";
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(0, 0, outerRingRadius * 0.22, 0, Math.PI * 2);
      ctx.lineWidth = Math.max(1.5, outerRingRadius * 0.006);
      ctx.strokeStyle = "rgba(255,255,255,0.16)";
      ctx.stroke();

      for (let deg = 0; deg < 180; deg += 5) {
        const rad = angleToCanvasRad(deg);
        const oppositeRad = angleToCanvasRad(deg + 180);

        const isMajor = deg % 30 === 0;
        const isMid = deg % 10 === 0;
        const isPrimary = deg === 0 || deg === 90;

        const outerTickOuter = outerRingRadius + (isPrimary ? outerRingRadius * 0.085 : isMajor ? outerRingRadius * 0.075 : isMid ? outerRingRadius * 0.055 : outerRingRadius * 0.034);
        const outerTickInner = outerRingRadius - (isPrimary ? outerRingRadius * 0.20 : isMajor ? outerRingRadius * 0.17 : isMid ? outerRingRadius * 0.12 : outerRingRadius * 0.075);

        const outerTickColor = isPrimary
          ? "rgba(255,255,255,1)"
          : isMajor
            ? "rgba(245,248,252,0.98)"
            : isMid
              ? "rgba(170,195,225,0.70)"
              : "rgba(205,185,140,0.42)";

        ctx.beginPath();
        ctx.moveTo(Math.cos(rad) * outerTickInner, Math.sin(rad) * outerTickInner);
        ctx.lineTo(Math.cos(rad) * outerTickOuter, Math.sin(rad) * outerTickOuter);
        ctx.moveTo(Math.cos(oppositeRad) * outerTickInner, Math.sin(oppositeRad) * outerTickInner);
        ctx.lineTo(Math.cos(oppositeRad) * outerTickOuter, Math.sin(oppositeRad) * outerTickOuter);
        ctx.lineWidth = isPrimary ? 3.2 : isMajor ? 2.8 : isMid ? 1.9 : 1.1;
        ctx.strokeStyle = outerTickColor;
        ctx.stroke();

        const innerTickOuter = innerNumberRingRadius + (isMajor ? innerNumberRingRadius * 0.04 : isMid ? innerNumberRingRadius * 0.03 : innerNumberRingRadius * 0.018);
        const innerTickInner = innerNumberRingRadius - (isMajor ? innerNumberRingRadius * 0.10 : isMid ? innerNumberRingRadius * 0.072 : innerNumberRingRadius * 0.046);

        const innerTickColor = isPrimary
          ? "rgba(235,244,255,0.90)"
          : isMajor
            ? "rgba(220,232,246,0.78)"
            : isMid
              ? "rgba(170,195,225,0.50)"
              : "rgba(210,190,150,0.26)";

        ctx.beginPath();
        ctx.moveTo(Math.cos(rad) * innerTickInner, Math.sin(rad) * innerTickInner);
        ctx.lineTo(Math.cos(rad) * innerTickOuter, Math.sin(rad) * innerTickOuter);
        ctx.moveTo(Math.cos(oppositeRad) * innerTickInner, Math.sin(oppositeRad) * innerTickInner);
        ctx.lineTo(Math.cos(oppositeRad) * innerTickOuter, Math.sin(oppositeRad) * innerTickOuter);
        ctx.lineWidth = isPrimary ? 2.0 : isMajor ? 1.7 : isMid ? 1.15 : 0.82;
        ctx.strokeStyle = innerTickColor;
        ctx.stroke();

        if (isMajor) {
          const topLabelRadius = outerRingRadius - outerRingRadius * 0.18;

          drawText(ctx, String(deg), Math.cos(rad) * topLabelRadius, Math.sin(rad) * topLabelRadius, {
            font: `800 ${Math.max(11, outerRingRadius * 0.078)}px -apple-system, BlinkMacSystemFont, Segoe UI, Arial`,
            fillStyle: isPrimary ? "rgba(255,255,255,1)" : "rgba(255,255,255,0.97)"
          });

          drawText(
            ctx,
            String(deg),
            Math.cos(oppositeRad) * reciprocalLabelRadius,
            Math.sin(oppositeRad) * reciprocalLabelRadius,
            {
              font: `760 ${Math.max(10, outerRingRadius * 0.063)}px -apple-system, BlinkMacSystemFont, Segoe UI, Arial`,
              fillStyle: isPrimary ? "rgba(195,230,255,1)" : "rgba(175,215,245,0.95)"
            }
          );
        }
      }

      const targetRad = angleToCanvasRad(targetDeg);
      const oppositeTargetRad = angleToCanvasRad(targetDeg + 180);

      ctx.save();
      ctx.shadowColor = targetGlow;
      ctx.shadowBlur = Math.max(8, outerRingRadius * 0.06);
      ctx.beginPath();
      ctx.moveTo(Math.cos(targetRad) * outerRingRadius, Math.sin(targetRad) * outerRingRadius);
      ctx.lineTo(Math.cos(oppositeTargetRad) * outerRingRadius, Math.sin(oppositeTargetRad) * outerRingRadius);
      ctx.lineWidth = Math.max(3.6, outerRingRadius * 0.0155);
      ctx.strokeStyle = targetStroke;
      ctx.stroke();
      ctx.restore();

      ctx.save();
      ctx.rotate((rollDeg * Math.PI) / 180);

      ctx.beginPath();
      ctx.moveTo(-halfLineWidth, 0);
      ctx.lineTo(halfLineWidth, 0);
      ctx.lineWidth = Math.max(4.4, outerRingRadius * 0.0185);
      ctx.strokeStyle = "rgba(240,180,41,0.98)";
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(-outerRingRadius * 0.16, 0);
      ctx.lineTo(outerRingRadius * 0.16, 0);
      ctx.lineWidth = Math.max(7.5, outerRingRadius * 0.031);
      ctx.strokeStyle = isNearTarget ? "rgba(88,211,141,0.99)" : "rgba(88,211,141,0.92)";
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(0, -outerRingRadius * 0.24);
      ctx.lineTo(0, outerRingRadius * 0.24);
      ctx.lineWidth = Math.max(3.1, outerRingRadius * 0.0135);
      ctx.strokeStyle = "rgba(255,255,255,0.96)";
      ctx.stroke();

      ctx.restore();

      ctx.beginPath();
      ctx.arc(0, 0, Math.max(5, outerRingRadius * 0.024), 0, Math.PI * 2);
      ctx.fillStyle = "rgba(255,255,255,0.98)";
      ctx.fill();

      ctx.restore();

      const targetLabel = `${String(clampAxis180(targetDeg)).padStart(3, "0")}°`;
      const tiltLabel = `${formatSignedAngle(rollDeg)} • Δ${diffToTarget.toFixed(1)}°`;

      ctx.save();
      const boxWidth = Math.max(170, width * 0.28);
      const boxHeight = Math.max(60, height * 0.095);
      const boxX = (width - boxWidth) / 2;
      const boxY = Math.max(14, height * 0.028);
      ctx.fillStyle = "rgba(0,0,0,0.34)";
      ctx.fillRect(boxX, boxY, boxWidth, boxHeight);
      ctx.strokeStyle = "rgba(255,255,255,0.18)";
      ctx.lineWidth = 2;
      ctx.strokeRect(boxX, boxY, boxWidth, boxHeight);
      ctx.restore();

      drawText(ctx, targetLabel, width / 2, Math.max(42, height * 0.072), {
        font: `900 ${Math.max(34, Math.round(height * 0.058))}px -apple-system, BlinkMacSystemFont, Segoe UI, Arial`,
        fillStyle: targetStroke
      });

      drawText(ctx, tiltLabel, width / 2, height * 0.66, {
        font: `800 ${Math.max(17, Math.round(height * 0.026))}px -apple-system, BlinkMacSystemFont, Segoe UI, Arial`,
        fillStyle: diffToTarget <= 3 ? "rgba(88,211,141,0.98)" : "rgba(240,180,41,0.98)"
      });

      return { cx, cy, innerActiveRadius, outerActiveRadius };
    }

    function drawOverlay() {
      resizeOverlayCanvas();
      drawOverlayOnContext(
        overlayCtx,
        overlayCanvasEl.width,
        overlayCanvasEl.height,
        getCurrentRollDeg(),
        getTargetAngle()
      );
    }

    function startOverlayLoop() {
      if (overlayAnimationId !== null) {
        cancelAnimationFrame(overlayAnimationId);
      }

      const loop = () => {
        drawOverlay();
        overlayAnimationId = requestAnimationFrame(loop);
      };

      loop();
    }

    function eventPointToAxisAngle(clientX, clientY) {
      const rect = previewShellEl.getBoundingClientRect();
      const x = clientX - rect.left;
      const y = clientY - rect.top;
      const cx = rect.width / 2;
      const cy = rect.height / 2;
      const dx = x - cx;
      const dy = cy - y;
      const r = Math.sqrt(dx * dx + dy * dy);

      const ringRadius = Math.min(rect.width, rect.height) * 0.33;
      const innerActiveRadius = ringRadius * 0.72;
      const outerActiveRadius = ringRadius * 1.03;

      if (r < innerActiveRadius || r > outerActiveRadius) {
        return null;
      }

      const deg360 = clampAngle360(Math.atan2(dy, dx) * 180 / Math.PI);
      return deg360 > 180 ? deg360 - 180 : deg360;
    }

    function updateAxisFromPointerEvent(event) {
      const point = event.touches?.[0] || event;
      if (!point) return;

      const angle = eventPointToAxisAngle(point.clientX, point.clientY);
      if (angle === null) return;

      setTargetAngle(angle);
    }

    function renderGallery() {
      galleryListEl.innerHTML = "";
      let previousDate = "";

      for (const item of galleryItems) {
        const itemDate = formatDateOnly(item.createdAt);

        if (item.visible !== false && itemDate !== previousDate) {
          const separator = document.createElement("div");
          separator.className = "gallery-date-separator";
          separator.textContent = itemDate;
          galleryListEl.appendChild(separator);
          previousDate = itemDate;
        }

        const card = createGalleryCard(item);
        if (item.visible === false) {
          card.classList.add("hidden");
        }
        galleryListEl.appendChild(card);
      }

      galleryListEl.appendChild(galleryEmptyEl);
      updateGalleryUi();
    }

    function createGalleryCard(item) {
      const card = document.createElement("article");
      card.className = "gallery-card";
      card.dataset.id = item.id;

      const thumbWrap = document.createElement("div");
      thumbWrap.className = "gallery-thumb-wrap";

      const img = document.createElement("img");
      img.className = "gallery-thumb";
      img.src = item.objectUrl;
      img.alt = item.fileName;
      thumbWrap.appendChild(img);

      const meta = document.createElement("div");
      meta.className = "gallery-meta";
      meta.innerHTML = `
        <div class="gallery-name">${item.fileName}</div>
        <div>${item.createdAtLabel}</div>
        <div>${item.width}x${item.height} • ${formatBytes(item.size)}</div>
      `;

      const actions = document.createElement("div");
      actions.className = "gallery-actions";

      const saveBtn = document.createElement("button");
      saveBtn.className = "mini-btn";
      saveBtn.type = "button";
      saveBtn.innerHTML = `<span class="btn-icon">⬇️</span><span>Kaydet</span>`;
      saveBtn.addEventListener("click", event => {
        event.stopPropagation();
        downloadBlob(item.blob, item.fileName);
      });

      const deleteBtn = document.createElement("button");
      deleteBtn.className = "mini-btn danger";
      deleteBtn.type = "button";
      deleteBtn.innerHTML = `<span class="btn-icon">🗑️</span><span>Sil</span>`;
      deleteBtn.addEventListener("click", async event => {
        event.stopPropagation();
        const yes = window.confirm(`Bu foto silinsin mi?\n${item.fileName}`);
        if (!yes) return;
        await removeGalleryItem(item.id);
      });

      actions.appendChild(saveBtn);
      actions.appendChild(deleteBtn);

      let lastTapAt = 0;
      card.addEventListener("click", () => {
        toggleGallerySelection(item.id);
      });

      card.addEventListener("dblclick", event => {
        event.preventDefault();
        openPreviewModal(item.id);
      });

      card.addEventListener("touchend", event => {
        const now = Date.now();
        if (now - lastTapAt < 280) {
          event.preventDefault();
          openPreviewModal(item.id);
        }
        lastTapAt = now;
      }, { passive: false });

      if (item.selected) {
        card.classList.add("selected");
      }

      card.appendChild(thumbWrap);
      card.appendChild(meta);
      card.appendChild(actions);

      return card;
    }

    async function persistGalleryItem(item) {
      if (!db) return;
      const stored = {
        id: item.id,
        fileName: item.fileName,
        blob: item.blob,
        createdAt: item.createdAt,
        createdAtLabel: item.createdAtLabel,
        width: item.width,
        height: item.height,
        size: item.size,
        patientName: item.patientName || "",
        iolType: item.iolType || ""
      };
      await dbPut(stored);
    }

    async function addGalleryItem(item) {
      galleryItems.unshift(item);
      applyGalleryFilter();
      renderGallery();
      await persistGalleryItem(item);
    }

    function toggleGallerySelection(id) {
      const item = galleryItems.find(entry => entry.id === id);
      if (!item) return;
      item.selected = !item.selected;
      const card = galleryListEl.querySelector(`[data-id="${CSS.escape(id)}"]`);
      card?.classList.toggle("selected", item.selected);
      updateGalleryUi();
    }

    async function removeGalleryItem(id) {
      const index = galleryItems.findIndex(item => item.id === id);
      if (index < 0) return;

      const [item] = galleryItems.splice(index, 1);
      URL.revokeObjectURL(item.objectUrl);

      if (db) {
        await dbDelete(id);
      }

      if (modalItemId === id) {
        closePreviewModal();
      }

      if (lastCapturedItemId === id) {
        const nextItem = galleryItems[0] || null;
        if (nextItem) {
          showLastCapturePreview(nextItem);
        } else {
          lastCapturedItemId = null;
          capturePreviewDismissed = false;
          capturePreviewBtnEl.classList.remove("visible");
          capturePreviewImgEl.removeAttribute("src");
        }
      }

      applyGalleryFilter();
      renderGallery();
    }

    async function deleteSelectedGalleryItems() {
      const selected = getSelectedGalleryItems();
      for (const item of [...selected]) {
        await removeGalleryItem(item.id);
      }
    }

    async function saveGalleryItems(items) {
      for (const item of items) {
        downloadBlob(item.blob, item.fileName);
        await new Promise(resolve => setTimeout(resolve, 120));
      }
    }

    function exportBackupJson() {
      const payload = galleryItems.map(item => ({
        id: item.id,
        fileName: item.fileName,
        createdAt: item.createdAt,
        createdAtLabel: item.createdAtLabel,
        width: item.width,
        height: item.height,
        size: item.size,
        patientName: item.patientName || "",
        iolType: item.iolType || ""
      }));

      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
      downloadBlob(blob, `torik_gallery_backup_${createTimeStampFilePart(Date.now())}.json`);
    }

    function applyGalleryFilter() {
      const q = galleryFilterText.trim().toLowerCase();

      for (const item of galleryItems) {
        const hay = [
          item.fileName,
          item.patientName,
          item.iolType,
          item.createdAtLabel
        ].join(" ").toLowerCase();
        item.visible = q ? hay.includes(q) : true;
      }

      updateGalleryUi();
    }

    function openPreviewModal(id) {
      const item = getGalleryItemById(id);
      if (!item) return;

      modalItemId = id;
      modalImageEl.src = item.objectUrl;
      modalTitleEl.textContent = item.fileName;
      previewModalEl.classList.add("active");
      resetModalTransform();
    }

    function closePreviewModal() {
      modalItemId = null;
      modalImageEl.src = "";
      modalTitleEl.textContent = "Önizleme";
      previewModalEl.classList.remove("active");
      resetModalTransform();
    }

    function applyPreviewSwipeTransform(offsetY) {
      const limited = Math.max(-140, Math.min(140, offsetY));
      const opacity = Math.max(0.12, 1 - Math.abs(limited) / 140);

      capturePreviewBtnEl.style.transition = "none";
      capturePreviewBtnEl.style.transform = `translateY(${limited}px) scale(${1 - Math.min(Math.abs(limited) / 500, 0.12)})`;
      capturePreviewBtnEl.style.opacity = String(opacity);

      if (limited > 8) {
        showGestureHint(previewGestureHintEl, "↓ Kapat");
      } else if (limited < -8) {
        showGestureHint(previewGestureHintEl, "↑ Paylaş");
      } else {
        hideGestureHint(previewGestureHintEl);
      }
    }

    function applyModalSwipeTransform(offsetY) {
      const limited = Math.max(-180, Math.min(180, offsetY));
      const bgAlpha = Math.max(0.10, 0.82 - Math.abs(limited) / 180);

      modalCardEl.style.transition = "none";
      previewModalEl.style.transition = "none";
      modalCardEl.style.transform = `translateY(${limited}px) scale(${1 - Math.min(Math.abs(limited) / 700, 0.08)})`;
      previewModalEl.style.background = `rgba(0,0,0,${bgAlpha})`;

      if (limited > 8) {
        showGestureHint(modalGestureHintEl, "↓ Kapat");
      } else if (limited < -8) {
        showGestureHint(modalGestureHintEl, "↑ Paylaş");
      } else {
        hideGestureHint(modalGestureHintEl);
      }
    }

    function previewSwipeStart(event) {
      if (!capturePreviewBtnEl.classList.contains("visible")) return;
      previewSwipeState.active = true;
      previewSwipeState.dragging = false;
      previewSwipeState.pointerId = event.pointerId;
      previewSwipeState.startY = event.clientY;
      previewSwipeState.startX = event.clientX;
      previewSwipeState.currentY = event.clientY;
      previewSwipeState.currentX = event.clientX;
      capturePreviewBtnEl.setPointerCapture?.(event.pointerId);
    }

    function previewSwipeMove(event) {
      if (!previewSwipeState.active || previewSwipeState.pointerId !== event.pointerId) return;

      previewSwipeState.currentY = event.clientY;
      previewSwipeState.currentX = event.clientX;
      const dy = previewSwipeState.currentY - previewSwipeState.startY;
      const dx = previewSwipeState.currentX - previewSwipeState.startX;

      if (Math.abs(dy) > 8 && Math.abs(dy) > Math.abs(dx) * 1.25) {
        previewSwipeState.dragging = true;
        applyPreviewSwipeTransform(dy);
      }
    }

    async function previewSwipeEnd(event) {
      if (!previewSwipeState.active || previewSwipeState.pointerId !== event.pointerId) return;

      const dy = previewSwipeState.currentY - previewSwipeState.startY;
      const shouldClose = dy > SWIPE_CLOSE_THRESHOLD;
      const shouldShare = dy < -SWIPE_SHARE_THRESHOLD;

      previewSwipeState.active = false;
      previewSwipeState.pointerId = null;

      if (previewSwipeState.dragging && shouldClose) {
        dismissCapturePreview();
        vibratePattern(8);
      } else if (previewSwipeState.dragging && shouldShare) {
        resetCapturePreviewTransform();
        vibratePattern(8);
        await shareGalleryItemById(lastCapturedItemId);
      } else {
        resetCapturePreviewTransform();
        if (!previewSwipeState.dragging) {
          openLastCapturePreview();
        }
      }

      previewSwipeState.dragging = false;
    }

    function modalSwipeStart(event) {
      if (!previewModalEl.classList.contains("active")) return;
      modalSwipeState.active = true;
      modalSwipeState.dragging = false;
      modalSwipeState.pointerId = event.pointerId;
      modalSwipeState.startY = event.clientY;
      modalSwipeState.startX = event.clientX;
      modalSwipeState.currentY = event.clientY;
      modalSwipeState.currentX = event.clientX;
      modalCardEl.setPointerCapture?.(event.pointerId);
    }

    function modalSwipeMove(event) {
      if (!modalSwipeState.active || modalSwipeState.pointerId !== event.pointerId) return;

      modalSwipeState.currentY = event.clientY;
      modalSwipeState.currentX = event.clientX;
      const dy = modalSwipeState.currentY - modalSwipeState.startY;
      const dx = modalSwipeState.currentX - modalSwipeState.startX;

      if (Math.abs(dy) > 8 && Math.abs(dy) > Math.abs(dx) * 1.25) {
        modalSwipeState.dragging = true;
        applyModalSwipeTransform(dy);
      }
    }

    async function modalSwipeEnd(event) {
      if (!modalSwipeState.active || modalSwipeState.pointerId !== event.pointerId) return;

      const dy = modalSwipeState.currentY - modalSwipeState.startY;
      const shouldClose = dy > SWIPE_CLOSE_THRESHOLD;
      const shouldShare = dy < -SWIPE_SHARE_THRESHOLD;

      modalSwipeState.active = false;
      modalSwipeState.pointerId = null;

      if (modalSwipeState.dragging && shouldClose) {
        closePreviewModal();
        vibratePattern(8);
      } else if (modalSwipeState.dragging && shouldShare) {
        resetModalTransform();
        vibratePattern(8);
        await shareGalleryItemById(modalItemId);
      } else {
        resetModalTransform();
      }

      modalSwipeState.dragging = false;
    }

    function moveCaretToEnd(input) {
      const value = input.value ?? "";
      const end = value.length;
      input.setSelectionRange(end, end);
    }

    function attachSmartFieldSelection(input) {
      let pointerDownX = 0;
      let pointerDownY = 0;
      let pointerMoved = false;

      input.addEventListener("pointerdown", event => {
        pointerDownX = event.clientX;
        pointerDownY = event.clientY;
        pointerMoved = false;
      });

      input.addEventListener("pointermove", event => {
        if (Math.abs(event.clientX - pointerDownX) > 6 || Math.abs(event.clientY - pointerDownY) > 6) {
          pointerMoved = true;
        }
      });

      input.addEventListener("focus", () => {
        requestAnimationFrame(() => {
          if (document.activeElement === input) {
            input.select();
          }
        });
      });

      input.addEventListener("pointerup", event => {
        if (pointerMoved) return;
        if (document.activeElement !== input) return;

        const rect = input.getBoundingClientRect();
        const x = event.clientX - rect.left;
        const valueLength = (input.value ?? "").length;

        if (!valueLength) {
          input.select();
          return;
        }

        const isNearEnd = x > rect.width * 0.82;

        requestAnimationFrame(() => {
          if (document.activeElement !== input) return;
          if (isNearEnd) {
            moveCaretToEnd(input);
          } else {
            input.select();
          }
        });
      });
    }

    function attachDecimalSanitizer(inputEl, options) {
      inputEl.addEventListener("input", () => {
        normalizeDecimalFieldInput(inputEl, options);
      });

      inputEl.addEventListener("blur", () => {
        const parsed = normalizeDecimalFieldInput(inputEl, options);
        if (parsed !== null) {
          inputEl.value = String(parsed);
        }
      });
    }

    async function capturePhoto() {
      if (!currentStream) {
        throw new Error("Önce kamera açılmalı.");
      }

      const width = videoEl.videoWidth;
      const height = videoEl.videoHeight;
      if (!width || !height) {
        throw new Error("Video hazır değil.");
      }

      await new Promise(resolve => setTimeout(resolve, 120));
      playShutterSound();
      flashCapture();

      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;

      const ctx = canvas.getContext("2d");
      if (!ctx) {
        throw new Error("Canvas alınamadı.");
      }

      ctx.drawImage(videoEl, 0, 0, width, height);

      const overlayCanvas = document.createElement("canvas");
      overlayCanvas.width = width;
      overlayCanvas.height = height;

      const overlayCanvasCtx = overlayCanvas.getContext("2d");
      if (!overlayCanvasCtx) {
        throw new Error("Overlay canvas alınamadı.");
      }

      drawOverlayOnContext(
        overlayCanvasCtx,
        width,
        height,
        getCurrentRollDeg(),
        getTargetAngle()
      );

      ctx.drawImage(overlayCanvas, 0, 0, width, height);
      drawMetadataOnContext(ctx, width, height);

      const blob = await new Promise((resolve, reject) => {
        canvas.toBlob(result => {
          if (!result) {
            reject(new Error("PNG üretilemedi."));
            return;
          }
          resolve(result);
        }, "image/png");
      });

      const createdAt = Date.now();
      const fileName = `${getOutputBaseName()}_${createTimeStampFilePart(createdAt)}.png`;
      const objectUrl = URL.createObjectURL(blob);

      const item = {
        id: `gallery_${createdAt}_${Math.random().toString(36).slice(2, 8)}`,
        fileName,
        blob,
        objectUrl,
        createdAt,
        createdAtLabel: formatDateTime(createdAt),
        width,
        height,
        size: blob.size,
        selected: false,
        visible: true,
        patientName: patientNameInputEl.value.trim(),
        iolType: iolTypeInputEl.value.trim()
      };

      await addGalleryItem(item);
      showLastCapturePreview(item);
      updateDiagnosticStatus(`Foto çekildi.\nGaleride saklandı: ${fileName}`);
    }

    async function handleMainAction() {
      if (!currentStream) {
        await primeAudio();
        await requestSensorPermissionFromGesture();
        updateDiagnosticStatus("Sensör izni alındı.");

        await requestCameraPermission();
        await populateDevices();
        await startSelectedCamera();
        updateUiState();

        window.setTimeout(() => {
          if (!lastOrientationAt && !lastMotionAt) {
            sensorSource = "none";
            updateStatePills();
            setStatus(
              [
                "Sensör event gelmiyor.",
                "1) HTTPS gerekli",
                "2) iPhone/Safari ise Motion & Orientation Access aç",
                "3) WebView/iframe sensör engelliyor olabilir",
                "4) Masaüstünde sensör olmayabilir"
              ].join("\n")
            );
          } else {
            updateDiagnosticStatus("Kamera ve sensör hazır.");
          }
        }, 1200);

        return;
      }

      await capturePhoto();
    }

    async function setupPwa() {
      try {
        const manifest = {
          name: "Torik IOL Marker",
          short_name: "Torik Marker",
          start_url: ".",
          display: "standalone",
          background_color: "#0b0f16",
          theme_color: "#0b0f16",
          icons: [{
            src: "data:image/svg+xml;base64," + btoa(`
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
                <rect width="192" height="192" rx="36" fill="#0b0f16"/>
                <circle cx="96" cy="96" r="58" fill="none" stroke="#4da3ff" stroke-width="10"/>
                <circle cx="96" cy="96" r="36" fill="none" stroke="#58d38d" stroke-width="8"/>
                <line x1="38" y1="96" x2="154" y2="96" stroke="#f0b429" stroke-width="8"/>
              </svg>
            `),
            sizes: "192x192",
            type: "image/svg+xml"
          }]
        };

        const manifestBlob = new Blob([JSON.stringify(manifest)], { type: "application/manifest+json" });
        const manifestUrl = URL.createObjectURL(manifestBlob);
        let link = document.querySelector('link[rel="manifest"]');
        if (!link) {
          link = document.createElement("link");
          link.rel = "manifest";
          document.head.appendChild(link);
        }
        link.href = manifestUrl;
      } catch (_) {}

      if ("serviceWorker" in navigator) {
        try {
          const swCode = `
            self.addEventListener("install", event => {
              self.skipWaiting();
            });
            self.addEventListener("activate", event => {
              event.waitUntil(self.clients.claim());
            });
            self.addEventListener("fetch", event => {
            });
          `;
          const swBlob = new Blob([swCode], { type: "text/javascript" });
          const swUrl = URL.createObjectURL(swBlob);
          await navigator.serviceWorker.register(swUrl);
        } catch (_) {}
      }

      window.addEventListener("beforeinstallprompt", event => {
        event.preventDefault();
        deferredInstallPrompt = event;
        installBtnEl.classList.add("visible");
      });

      installBtnEl.addEventListener("click", async () => {
        if (!deferredInstallPrompt) return;
        deferredInstallPrompt.prompt();
        try {
          await deferredInstallPrompt.userChoice;
        } catch (_) {}
        deferredInstallPrompt = null;
        installBtnEl.classList.remove("visible");
      });
    }

    mainActionBtnEl.addEventListener("click", async () => {
      try {
        await handleMainAction();
      } catch (error) {
        setStatus(`Hata:\n${error instanceof Error ? error.message : String(error)}`);
      }
    });

    refreshBtnEl.addEventListener("click", async () => {
      try {
        await populateDevices();
        await startSelectedCamera();
      } catch (error) {
        setStatus(`Hata:\n${error instanceof Error ? error.message : String(error)}`);
      }
    });

    videoDeviceEl.addEventListener("change", async () => {
      try {
        await startSelectedCamera();
      } catch (error) {
        setStatus(`Hata:\n${error instanceof Error ? error.message : String(error)}`);
      }
    });

    torchBtnEl.addEventListener("click", async () => {
      try {
        await toggleTorch();
      } catch (error) {
        setStatus(`Hata:\n${error instanceof Error ? error.message : String(error)}`);
      }
    });

    dataTabBtnEl.addEventListener("click", () => setActiveTab("data"));
    galleryTabBtnEl.addEventListener("click", () => setActiveTab("gallery"));

    galleryDownloadAllBtnEl.addEventListener("click", async () => {
      if (!galleryItems.length) return;
      await saveGalleryItems(galleryItems);
    });

    gallerySaveSelectedBtnEl.addEventListener("click", async () => {
      const selected = getSelectedGalleryItems();
      if (!selected.length) return;
      await saveGalleryItems(selected);
    });

    galleryBackupBtnEl.addEventListener("click", () => {
      if (!galleryItems.length) return;
      exportBackupJson();
      updateDiagnosticStatus("Galeri yedeği dışa aktarıldı.");
    });

    galleryDeleteSelectedBtnEl.addEventListener("click", async () => {
      const selected = getSelectedGalleryItems();
      if (!selected.length) return;
      const names = selected.slice(0, 3).map(item => item.fileName).join("\n");
      const extra = selected.length > 3 ? `\n+${selected.length - 3} daha` : "";
      if (!window.confirm(`${selected.length} seçili foto silinsin mi?\n\n${names}${extra}`)) return;
      await deleteSelectedGalleryItems();
      updateDiagnosticStatus("Seçili fotoğraflar silindi.");
    });

    galleryFilterInputEl.addEventListener("input", () => {
      galleryFilterText = galleryFilterInputEl.value;
      galleryFilterMirrorEl.value = galleryFilterText;
      applyGalleryFilter();
      renderGallery();
    });

    galleryFilterMirrorEl.addEventListener("input", () => {
      galleryFilterText = galleryFilterMirrorEl.value;
      galleryFilterInputEl.value = galleryFilterText;
      applyGalleryFilter();
      renderGallery();
    });

    clearFilterBtnEl.addEventListener("click", () => {
      galleryFilterText = "";
      galleryFilterInputEl.value = "";
      galleryFilterMirrorEl.value = "";
      applyGalleryFilter();
      renderGallery();
    });

    capturePreviewBtnEl.addEventListener("pointerdown", previewSwipeStart);
    capturePreviewBtnEl.addEventListener("pointermove", previewSwipeMove);
    capturePreviewBtnEl.addEventListener("pointerup", previewSwipeEnd);
    capturePreviewBtnEl.addEventListener("pointercancel", previewSwipeEnd);

    modalCardEl.addEventListener("pointerdown", modalSwipeStart);
    modalCardEl.addEventListener("pointermove", modalSwipeMove);
    modalCardEl.addEventListener("pointerup", modalSwipeEnd);
    modalCardEl.addEventListener("pointercancel", modalSwipeEnd);

    modalCloseBtnEl.addEventListener("click", closePreviewModal);
    modalDismissBtnEl.addEventListener("click", closePreviewModal);

    previewModalEl.addEventListener("click", event => {
      if (event.target === previewModalEl) {
        closePreviewModal();
      }
    });

    modalSaveBtnEl.addEventListener("click", () => {
      if (!modalItemId) return;
      const item = getGalleryItemById(modalItemId);
      if (!item) return;
      downloadBlob(item.blob, item.fileName);
    });

    modalDeleteBtnEl.addEventListener("click", async () => {
      if (!modalItemId) return;
      const item = getGalleryItemById(modalItemId);
      if (!item) return;
      if (!window.confirm(`Bu foto silinsin mi?\n${item.fileName}`)) return;
      await removeGalleryItem(modalItemId);
    });

    [
      patientNameInputEl,
      iolTypeInputEl,
      sphInputEl,
      cylInputEl,
      axlInputEl,
      targetAngleInputEl,
      galleryFilterInputEl,
      galleryFilterMirrorEl
    ].forEach(attachSmartFieldSelection);

    attachDecimalSanitizer(sphInputEl, { min: -99, max: 99, allowNegative: true });
    attachDecimalSanitizer(cylInputEl, { min: -99, max: 99, allowNegative: true });

    targetAngleInputEl.addEventListener("input", () => {
      targetAngleInputEl.value = sanitizeIntegerInput(targetAngleInputEl.value);
      const value = syncAxisFieldsFrom("target");
      maybeHapticOnAngle(value);
      drawOverlay();
    });

    axlInputEl.addEventListener("input", () => {
      axlInputEl.value = sanitizeIntegerInput(axlInputEl.value);
      const value = syncAxisFieldsFrom("axl");
      maybeHapticOnAngle(value);
      drawOverlay();
    });

    targetAngleInputEl.addEventListener("blur", () => {
      const value = normalizeAngleFieldInput(targetAngleInputEl, 63);
      setTargetAngle(value);
    });

    axlInputEl.addEventListener("blur", () => {
      const value = normalizeAngleFieldInput(axlInputEl, 63);
      setTargetAngle(value);
    });

    previewShellEl.addEventListener("pointerdown", event => {
      const angle = eventPointToAxisAngle(event.clientX, event.clientY);
      if (angle === null) {
        isDraggingAxis = false;
        return;
      }

      isDraggingAxis = true;
      previewShellEl.setPointerCapture?.(event.pointerId);
      setTargetAngle(angle);
    });

    previewShellEl.addEventListener("pointermove", event => {
      if (!isDraggingAxis) return;
      updateAxisFromPointerEvent(event);
    });

    previewShellEl.addEventListener("pointerup", () => {
      isDraggingAxis = false;
    });

    previewShellEl.addEventListener("pointercancel", () => {
      isDraggingAxis = false;
    });

    window.addEventListener("resize", () => {
      drawOverlay();
    });

    navigator.mediaDevices?.addEventListener?.("devicechange", async () => {
      if (!permissionGranted) return;
      try {
        await populateDevices();
        updateUiState();
      } catch (_) {}
    });

    window.addEventListener("keydown", event => {
      if (event.key === "Escape") {
        closePreviewModal();
      }
    });

    window.addEventListener("beforeunload", () => {
      cleanupStream();

      if (motionListening) {
        window.removeEventListener("devicemotion", handleDeviceMotion, true);
      }

      if (orientationListening) {
        window.removeEventListener("deviceorientation", handleDeviceOrientation, true);
      }

      if (overlayAnimationId !== null) {
        cancelAnimationFrame(overlayAnimationId);
      }

      if (sensorWatchdogId !== null) {
        clearInterval(sensorWatchdogId);
      }

      for (const item of galleryItems) {
        URL.revokeObjectURL(item.objectUrl);
      }
    });

    (async () => {
      setTargetAngle(63);
      setActiveTab("data");
      updateUiState();
      drawOverlay();
      startOverlayLoop();
      startSensorWatchdog();
      await setupPwa();

      try {
        await initDb();
      } catch (error) {
        setStatus(`Galeri veritabanı açılamadı:\n${error instanceof Error ? error.message : String(error)}`);
      }
    })();
  </script>
</body>
</html>
