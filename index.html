<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
  <title>Torik IOL Marker</title>
  <meta name="theme-color" content="#0b0f16" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0f16;
      --panel: #151b24;
      --border: #2a3140;
      --text: #edf2f7;
      --muted: #a6b0c0;
      --success: #58d38d;
      --warning: #f0b429;
      --danger: #f87171;
      --tab: #0f141b;
      --tab-active: #1d2633;
      --select: #60a5fa;
      --accent: #4da3ff;
      --accent-soft: rgba(77,163,255,0.18);
    }

    html {
      -webkit-text-size-adjust: 100%;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      min-width: 0;
      user-select: none;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Arial, sans-serif;
    }

    body {
      padding:
        max(4px, env(safe-area-inset-top))
        6px
        max(10px, env(safe-area-inset-bottom))
        6px;
    }

    .app {
      height: calc(100dvh - env(safe-area-inset-top) - env(safe-area-inset-bottom) - 14px);
      display: grid;
      grid-template-rows: auto minmax(0, 56dvh) minmax(0, 1fr);
      gap: 4px;
      overflow: hidden;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 8px;
      min-height: 0;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
    }

    .header-card {
      padding: 6px 10px;
      display: grid;
      gap: 4px;
    }

    h1 {
      margin: 0;
      font-size: 15px;
      line-height: 1.05;
    }

    .top-meta {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
    }

    .pill {
      border-radius: 999px;
      padding: 5px 8px;
      font-size: 11px;
      background: rgba(10, 12, 16, 0.78);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: inline-flex;
      gap: 6px;
      align-items: center;
    }

    .pill.ok { border-color: rgba(88,211,141,0.35); }
    .pill.warn { border-color: rgba(240,180,41,0.35); }
    .pill.bad { border-color: rgba(248,113,113,0.35); }

    .preview-card {
      padding: 8px;
      min-height: 0;
      overflow: hidden;
      display: grid;
    }

    .preview-shell {
      position: relative;
      min-height: 0;
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      background: #000;
      touch-action: none;
    }

    video, canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    video {
      object-fit: cover;
      background: #000;
      z-index: 1;
    }

    #overlayCanvas {
      z-index: 2;
      pointer-events: none;
    }

    .preview-head {
      position: absolute;
      top: 8px;
      left: 8px;
      right: 8px;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      pointer-events: none;
      z-index: 3;
    }

    .gesture-hint {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      z-index: 6;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 11px;
      background: rgba(0,0,0,0.58);
      border: 1px solid rgba(255,255,255,0.14);
      color: rgba(255,255,255,0.96);
      opacity: 0;
      transition: opacity 120ms ease, transform 120ms ease;
      pointer-events: none;
      white-space: nowrap;
    }

    .gesture-hint.visible {
      opacity: 1;
    }

    #previewGestureHint {
      top: 12px;
    }

    #modalGestureHint {
      top: 14px;
    }

    .overlay-corner-actions {
      position: absolute;
      right: 10px;
      bottom: 10px;
      z-index: 4;
      pointer-events: auto;
    }

    .overlay-icon-btn {
      width: 48px;
      height: 48px;
      min-height: 48px;
      padding: 0;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(12, 16, 22, 0.34);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.08),
        0 6px 14px rgba(0,0,0,0.18);
    }

    .overlay-icon-btn .btn-icon {
      font-size: 22px;
    }

    .capture-flash {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.92);
      opacity: 0;
      pointer-events: none;
      z-index: 6;
    }

    .capture-flash.active {
      animation: captureFlashAnim 180ms ease-out;
    }

    @keyframes captureFlashAnim {
      0% { opacity: 0; }
      15% { opacity: 0.9; }
      100% { opacity: 0; }
    }

    .controls {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 6px;
      min-height: 0;
      padding-bottom: calc(env(safe-area-inset-bottom) + 4px);
    }

    .capture-row {
      display: grid;
      grid-template-columns: 54px 1fr;
      gap: 6px;
      align-items: stretch;
      flex: 0 0 auto;
    }

    .mini-square-btn {
      width: 54px;
      height: 54px;
      min-height: 54px;
      padding: 0;
      border-radius: 14px;
    }

    .mini-square-btn .btn-icon {
      font-size: 22px;
    }

    input, select, button {
      width: 100%;
      min-height: 38px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #0f141b;
      color: var(--text);
      padding: 0 10px;
      font-size: 14px;
    }

    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      font-weight: 600;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02)),
        linear-gradient(180deg, #313847, #1c222d);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.08),
        inset 0 -1px 0 rgba(0,0,0,0.25),
        0 1px 1px rgba(0,0,0,0.35),
        0 8px 18px rgba(0,0,0,0.12);
    }

    button:disabled, input:disabled, select:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .btn-icon {
      font-size: 18px;
      line-height: 1;
      flex: 0 0 auto;
    }

    .success { border-color: rgba(88, 211, 141, 0.45); }
    .danger { border-color: rgba(248, 113, 113, 0.45); }
    .warning { border-color: rgba(240,180,41,0.42); }

    .capture-primary {
      min-height: 54px;
      font-size: 17px;
      font-weight: 800;
      border-radius: 14px;
    }

    .capture-primary .btn-icon {
      font-size: 24px;
    }

    .bottom-panel {
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 6px;
    }

    .tab-row {
      display: grid;
      grid-template-columns: 1fr 1fr auto auto;
      gap: 6px;
      align-items: center;
      flex: 0 0 auto;
    }

    .tab-btn {
      min-height: 34px;
      font-size: 12px;
      border-radius: 10px;
      background: var(--tab);
      box-shadow: none;
    }

    .tab-btn.active {
      background: var(--tab-active);
      border-color: rgba(255,255,255,0.16);
    }

    .install-btn {
      min-height: 34px;
      width: auto;
      padding: 0 10px;
      font-size: 12px;
      border-radius: 10px;
      display: none;
      box-shadow: none;
    }

    .install-btn.visible {
      display: inline-flex;
    }

    .tab-body {
      min-height: 0;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(10, 15, 23, 0.92);
      overflow: hidden;
    }

    .tab-pane {
      display: none;
      height: 100%;
      min-height: 0;
    }

    .tab-pane.active {
      display: grid;
    }

    .data-pane {
      grid-template-rows: auto auto auto;
      gap: 6px;
      padding: 8px;
      overflow: auto;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      gap: 5px;
    }

    .span-3 { grid-column: span 3; }
    .span-4 { grid-column: span 4; }
    .span-6 { grid-column: span 6; }

    label.field {
      display: grid;
      gap: 2px;
      color: var(--muted);
      font-size: 10px;
      min-width: 0;
    }

    .status {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(10, 15, 23, 0.92);
      padding: 7px 9px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.25;
      white-space: pre-wrap;
      min-height: 52px;
      max-height: 96px;
      overflow: auto;
    }

    .footer-meta {
      color: var(--muted);
      font-size: 10px;
      line-height: 1.25;
      text-align: center;
      opacity: 0.9;
      padding-top: 1px;
    }

    .gallery-pane {
      grid-template-rows: auto auto minmax(0, 1fr);
      min-height: 0;
      overflow: hidden;
    }

    .gallery-toolbar {
      display: grid;
      grid-template-columns: 1fr auto auto auto auto;
      gap: 6px;
      padding: 8px;
      border-bottom: 1px solid var(--border);
      align-items: center;
    }

    .gallery-counter {
      color: var(--muted);
      font-size: 11px;
    }

    .gallery-filter-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 6px;
      padding: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .gallery-list {
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 8px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      align-content: start;
      align-items: start;
      grid-auto-rows: max-content;
      -webkit-overflow-scrolling: touch;
    }

    .gallery-date-separator {
      grid-column: 1 / -1;
      font-size: 10px;
      color: var(--muted);
      padding: 4px 2px 2px 2px;
      border-top: 1px dashed rgba(255,255,255,0.08);
      margin-top: 2px;
    }

    .gallery-empty {
      color: var(--muted);
      font-size: 12px;
      text-align: center;
      padding: 16px;
      border: 1px dashed var(--border);
      border-radius: 12px;
      grid-column: 1 / -1;
    }

    .gallery-card {
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      background: #0f141b;
      display: grid;
      grid-template-rows: auto auto auto;
      transition: border-color 120ms ease, box-shadow 120ms ease;
      align-self: start;
      height: auto;
    }

    .gallery-card.hidden {
      display: none;
    }

    .gallery-card.selected {
      border-color: rgba(96,165,250,0.9);
      box-shadow: 0 0 0 2px rgba(96,165,250,0.22);
    }

    .gallery-card.selected .gallery-name::before {
      content: "✓ ";
      color: var(--select);
    }

    .gallery-thumb-wrap {
      aspect-ratio: 4 / 3;
      background: #000;
      overflow: hidden;
      position: relative;
      width: 100%;
      height: auto;
    }

    .gallery-thumb {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
    }

    .gallery-meta {
      padding: 6px 8px 0 8px;
      display: grid;
      gap: 2px;
      font-size: 10px;
      color: var(--muted);
    }

    .gallery-name {
      color: var(--text);
      font-size: 11px;
      font-weight: 600;
      word-break: break-word;
    }

    .gallery-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      padding: 8px;
    }

    .mini-btn {
      min-height: 32px;
      font-size: 11px;
      border-radius: 10px;
      box-shadow: none;
    }

    .mini-btn .btn-icon {
      font-size: 14px;
    }

    .capture-preview {
      position: fixed;
      right: max(14px, env(safe-area-inset-right) + 14px);
      bottom: max(18px, env(safe-area-inset-bottom) + 18px);
      width: min(36vw, 220px);
      aspect-ratio: 4 / 3;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.26);
      box-shadow:
        0 18px 40px rgba(0,0,0,0.50),
        0 0 0 1px rgba(255,255,255,0.10) inset;
      background: #000;
      z-index: 80;
      opacity: 0;
      transform: translateY(10px) scale(0.95);
      pointer-events: none;
      transition: opacity 260ms ease, transform 260ms ease;
      touch-action: none;
    }

    .capture-preview.visible {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }

    .capture-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .capture-preview-badge {
      position: absolute;
      left: 8px;
      top: 8px;
      z-index: 2;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 10px;
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.14);
      color: rgba(255,255,255,0.92);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      pointer-events: none;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.82);
      z-index: 30;
      display: none;
      align-items: center;
      justify-content: center;
      padding:
        max(12px, env(safe-area-inset-top))
        12px
        max(12px, env(safe-area-inset-bottom))
        12px;
      transition: background 180ms ease;
      touch-action: none;
    }

    .modal-backdrop.active {
      display: flex;
    }

    .modal-card {
      width: min(100%, 720px);
      max-height: 100%;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      gap: 8px;
      background: #111827;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 10px;
      transition: transform 180ms ease;
      touch-action: none;
      will-change: transform;
      position: relative;
    }

    .modal-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
    }

    .modal-title {
      font-size: 13px;
      color: var(--muted);
      word-break: break-word;
    }

    .modal-close {
      width: 42px;
      min-width: 42px;
      min-height: 42px;
      padding: 0;
    }

    .modal-image-wrap {
      min-height: 0;
      display: grid;
      place-items: center;
      overflow: auto;
      background: #000;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.08);
      position: relative;
    }

    .modal-image {
      max-width: 100%;
      max-height: 100%;
      display: block;
      object-fit: contain;
    }

    .modal-actions {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }

    .hint-badge {
      position: absolute;
      right: 10px;
      top: 10px;
      padding: 4px 8px;
      font-size: 10px;
      border-radius: 999px;
      background: rgba(0,0,0,0.48);
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.92);
      z-index: 7;
    }

    input.invalid {
      border-color: rgba(248,113,113,0.72);
      box-shadow: 0 0 0 1px rgba(248,113,113,0.20) inset;
    }

    @media (max-width: 980px) {
      .gallery-list {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .capture-preview {
        width: min(42vw, 210px);
      }

      .gallery-toolbar {
        grid-template-columns: 1fr auto auto;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="card header-card">
      <h1>Torik IOL Marker</h1>
      <div class="top-meta">
        <div id="cameraStatePill" class="pill warn">Kamera: Kapalı</div>
        <div id="sensorStatePill" class="pill warn">Sensör: Bekliyor</div>
        <div id="qualityPill" class="pill">Çözünürlük: -</div>
      </div>
    </section>

    <section class="card preview-card">
      <div id="previewShell" class="preview-shell">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="overlayCanvas"></canvas>
        <div id="captureFlash" class="capture-flash"></div>

        <div class="preview-head">
          <div class="pill">📸 Foto</div>
          <div class="pill" id="streamPill">Hazır değil</div>
        </div>

        <div id="previewGestureHint" class="gesture-hint"></div>

        <div class="overlay-corner-actions">
          <button id="torchBtn" class="overlay-icon-btn" type="button" disabled aria-label="Torch">
            <span class="btn-icon" id="torchIcon">💡</span>
          </button>
        </div>
      </div>
    </section>

    <section class="card controls">
      <div class="capture-row">
        <button id="refreshBtn" class="mini-square-btn" type="button" disabled aria-label="Yenile">
          <span class="btn-icon">🔄</span>
        </button>

        <button id="mainActionBtn" class="success capture-primary" type="button">
          <span class="btn-icon" id="mainActionIcon">🔓</span>
          <span id="mainActionLabel">İzin Ver ve Başlat</span>
        </button>
      </div>

      <div class="bottom-panel">
        <div class="tab-row">
          <button id="dataTabBtn" class="tab-btn active" type="button">Veri</button>
          <button id="galleryTabBtn" class="tab-btn" type="button">Galeri</button>
          <button id="installBtn" class="install-btn" type="button">📲 Yükle</button>
          <span class="footer-meta" id="buildInfo">v1.59 • Güncelleme: 2026-04-06 15:35</span>
        </div>

        <div class="tab-body">
          <div id="dataPane" class="tab-pane data-pane active">
            <div class="form-grid">
              <label class="field span-6">
                İsim
                <input id="patientNameInput" type="text" autocomplete="off" placeholder="Örn: Ahmet Yılmaz" />
              </label>

              <label class="field span-6">
                IOL Tipi
                <input id="iolTypeInput" type="text" autocomplete="off" placeholder="Torik IOL" />
              </label>

              <label class="field span-3">
                Sph
                <input id="sphInput" type="text" inputmode="decimal" autocomplete="off" placeholder="22.5" />
              </label>

              <label class="field span-3">
                Cyl
                <input id="cylInput" type="text" inputmode="decimal" autocomplete="off" placeholder="-1.25" />
              </label>

              <label class="field span-3">
                Axl
                <input id="axlInput" type="text" inputmode="numeric" pattern="[0-9]*" autocomplete="off" placeholder="63" />
              </label>

              <label class="field span-3">
                Hedef Açı
                <input id="targetAngleInput" type="text" inputmode="numeric" pattern="[0-9]*" autocomplete="off" value="63" />
              </label>
            </div>

            <div class="form-grid">
              <label class="field span-6">
                Kamera
                <select id="videoDevice"></select>
              </label>

              <label class="field span-3">
                Filtre
                <input id="galleryFilterMirror" type="text" placeholder="Galeri filtre" autocomplete="off" />
              </label>

              <label class="field span-3">
                Durum
                <input id="captureQualityMirror" type="text" disabled value="-" />
              </label>
            </div>

            <div class="status" id="status">Hazır. Aşağı çekerek kapat, yukarı çekerek paylaş. Klinik hizalama için merkez halkası ve aks yakınlık vurgusu aktif.</div>
          </div>

          <div id="galleryPane" class="tab-pane gallery-pane">
            <div class="gallery-toolbar">
              <div class="gallery-counter" id="galleryCounter">0 öğe</div>
              <button id="gallerySaveSelectedBtn" class="mini-btn" type="button" disabled>
                <span class="btn-icon">💾</span>
                <span>Seçili</span>
              </button>
              <button id="galleryDownloadAllBtn" class="mini-btn" type="button" disabled>
                <span class="btn-icon">⬇️</span>
                <span>Tümü</span>
              </button>
              <button id="galleryBackupBtn" class="mini-btn warning" type="button" disabled>
                <span class="btn-icon">🧾</span>
                <span>Yedek</span>
              </button>
              <button id="galleryDeleteSelectedBtn" class="mini-btn danger" type="button" disabled>
                <span class="btn-icon">🗑️</span>
                <span>Sil</span>
              </button>
            </div>

            <div class="gallery-filter-row">
              <input id="galleryFilterInput" type="text" autocomplete="off" placeholder="Hasta adına / dosya adına göre filtrele" />
              <button id="clearFilterBtn" class="mini-btn" type="button">Temizle</button>
            </div>

            <div id="galleryList" class="gallery-list">
              <div class="gallery-empty" id="galleryEmpty">Henüz foto yok.</div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <button id="capturePreviewBtn" class="capture-preview" type="button" aria-label="Son foto önizleme">
    <div class="capture-preview-badge">Son foto</div>
    <img id="capturePreviewImg" alt="Son çekilen foto" />
  </button>

  <div id="previewModal" class="modal-backdrop">
    <div id="modalCard" class="modal-card">
      <div id="modalGestureHint" class="gesture-hint"></div>

      <div class="modal-head">
        <div id="modalTitle" class="modal-title">Önizleme</div>
        <button id="modalCloseBtn" class="modal-close" type="button">✕</button>
      </div>

      <div class="modal-image-wrap">
        <div class="hint-badge">↓ Kapat • ↑ Paylaş</div>

    function setStatus(message) {

    function pad2(value) {
      return String(value).padStart(2, "0");
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function clampAxis180(value) {
      return clamp(Math.round(Number(value) || 0), 0, 180);
    }

    function clampAngle360(value) {
      let result = value % 360;
      if (result < 0) result += 360;
      return result;
    }

    function normalizeSigned180(value) {
      let result = clampAngle360(value);
      if (result > 180) result -= 360;
      return result;
    }

    function angleToCanvasRad(deg) {
      return (-deg * Math.PI) / 180;
    }

    function formatSignedAngle(value) {
      const rounded = Math.round(value * 10) / 10;
      const sign = rounded > 0 ? "+" : "";
      return `${sign}${rounded.toFixed(1)}°`;
    }

    function smoothAngleDeg(previous, next, alpha) {
      const delta = normalizeSigned180(next - previous);
      return normalizeSigned180(previous + delta * alpha);
    }

    function formatBytes(bytes) {
      if (bytes < 1024) return `${bytes} B`;
      if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
      return `${(bytes / (1024 * 1024)).toFixed(2)} MB`;
    }

    function sanitizeDecimalInput(raw, allowNegative = true) {
      let value = String(raw ?? "").replace(",", ".").replace(/[^\d.\-]/g, "");
      if (!allowNegative) value = value.replace(/-/g, "");
      const negative = allowNegative && value.startsWith("-");
      value = value.replace(/-/g, "");
      const parts = value.split(".");
      const intPart = parts.shift() ?? "";
      const fracPart = parts.length ? parts.join("") : "";
      return `${negative ? "-" : ""}${intPart}${fracPart ? `.${fracPart}` : ""}`;
    }

    function sanitizeIntegerInput(raw) {
      return String(raw ?? "").replace(/[^\d]/g, "");
    }

    function normalizeAngleFieldInput(inputEl, fallback = 0) {
      const cleaned = sanitizeIntegerInput(inputEl.value);
      if (cleaned === "") {
        inputEl.value = "";
        inputEl.classList.remove("invalid");
        return fallback;
      }
      const clamped = clampAxis180(cleaned);
      inputEl.value = String(clamped);
      inputEl.classList.remove("invalid");
      return clamped;
    }

    function normalizeDecimalFieldInput(inputEl, { min = -999, max = 999, allowNegative = true } = {}) {
      const cleaned = sanitizeDecimalInput(inputEl.value, allowNegative);
      inputEl.value = cleaned;
      if (cleaned === "" || cleaned === "-") {
        inputEl.classList.remove("invalid");
        return null;
      }
      const number = Number(cleaned);
      if (!Number.isFinite(number) || number < min || number > max) {
        inputEl.classList.add("invalid");
        return null;
      }
      inputEl.classList.remove("invalid");
      return number;
    }

    function setActiveTab(tab) {
      activeTab = tab;
      const isData = tab === "data";
      dataTabBtnEl.classList.toggle("active", isData);
      galleryTabBtnEl.classList.toggle("active", !isData);
      dataPaneEl.classList.toggle("active", isData);
      galleryPaneEl.classList.toggle("active", !isData);
      updateCapturePreviewVisibility();
    }

    function vibratePattern(pattern) {
      if (navigator.vibrate) navigator.vibrate(pattern);
    }

    function maybeHapticOnAngle(angle) {
      const snapped = Math.round(angle / HAPTIC_STEP_DEG) * HAPTIC_STEP_DEG;
      const now = Date.now();

      if (snapped === lastHapticStep && now - lastHapticAt < HAPTIC_MIN_INTERVAL_MS) {
        return;
      }

      if (snapped !== lastHapticStep) {
        if (snapped === 0 || snapped === 90 || snapped === 180) {
          vibratePattern([18, 24, 18]);
        } else {
          vibratePattern(8);
        }
        lastHapticStep = snapped;
        lastHapticAt = now;
      }
    }

    function syncAxisFieldsFrom(source) {
      if (source === "axl") {
        const value = normalizeAngleFieldInput(axlInputEl, 0);
        axlInputEl.value = String(value);
        targetAngleInputEl.value = String(value);
        return value;
      }

      const value = normalizeAngleFieldInput(targetAngleInputEl, 0);
      targetAngleInputEl.value = String(value);
      axlInputEl.value = String(value);
      return value;
    }

    function setTargetAngle(angle) {
      const normalized = clampAxis180(angle);
      targetAngleInputEl.value = String(normalized);
      axlInputEl.value = String(normalized);
      maybeHapticOnAngle(normalized);
      drawOverlay();
    }

    function getTargetAngle() {
      return clampAxis180(targetAngleInputEl.value || 63);
    }

    function getCurrentRollDeg() {
      return normalizeSigned180(rawRollDeg);
    }

    function getAxisDiffDeg(angleA, angleB) {
      const delta = Math.abs(((angleA - angleB + 90) % 180) - 90);
      return Math.abs(delta);

    function createTimeStampFilePart(timestamp) {
      const d = new Date(timestamp);
      return `${d.getFullYear()}${pad2(d.getMonth() + 1)}${pad2(d.getDate())}_${pad2(d.getHours())}${pad2(d.getMinutes())}${pad2(d.getSeconds())}`;
    }

    function formatDateTime(timestamp) {
      const d = new Date(timestamp);
      return `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())} ${pad2(d.getHours())}:${pad2(d.getMinutes())}:${pad2(d.getSeconds())}`;
    }

    function formatDateOnly(timestamp) {
      const d = new Date(timestamp);
      return `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())}`;
    }

    function sanitizePart(value, fallback = "x") {
      const v = String(value || "").trim();
      if (!v) return fallback;
      return v
        .replace(/[<>:"/\\|?*\u0000-\u001F]/g, "-")
        .replace(/\s+/g, "_")
        .replace(/_+/g, "_")
        .replace(/^[_\-.]+|[_\-.]+$/g, "")
        .slice(0, 60) || fallback;
    }

    function normalizeAngleValue(value) {
      return String(clampAxis180(value)).padStart(3, "0");
    }

    function getOutputBaseName() {
      const name = sanitizePart(patientNameInputEl.value, "hasta");
      const iol = sanitizePart(iolTypeInputEl.value, "Torik_IOL");
      const sph = sanitizePart(sphInputEl.value, "xSph");
      const cyl = sanitizePart(cylInputEl.value, "xCyl");
      const axl = normalizeAngleValue(axlInputEl.value || 0);
      const angle = normalizeAngleValue(targetAngleInputEl.value || 63);
      return `${name}_${iol}_${sph}_${cyl}_${axl}axl_${angle}deg`;
    }

    function updateDiagnosticStatus(prefix = "") {

    function downloadBlob(blob, fileName) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = fileName;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 2000);
    }

    async function shareBlobOrDownload(blob, fileName) {
      const file = new File([blob], fileName, { type: blob.type || "image/png" });

      if (navigator.share && navigator.canShare) {
        try {
          if (navigator.canShare({ files: [file] })) {
            await navigator.share({
              files: [file],
              title: fileName
            });
            return "shared";
          }
        } catch (error) {
          if (error?.name === "AbortError") {
            return "cancelled";
          }
        }
      }

      downloadBlob(blob, fileName);
      return "downloaded";
    }

    async function shareGalleryItemById(id) {
      const item = getGalleryItemById(id);
      if (!item) return;

      const result = await shareBlobOrDownload(item.blob, item.fileName);

      if (result === "shared") {
        updateDiagnosticStatus(`Paylaşım açıldı.\n${item.fileName}`);
      } else if (result === "downloaded") {
        updateDiagnosticStatus(`Paylaşım desteklenmedi. İndirme başlatıldı.\n${item.fileName}`);
      }
    }

    function ensureAudioContext() {
      const AudioCtx = window.AudioContext || window.webkitAudioContext;
      if (!AudioCtx) return null;
      if (!audioState.ctx) {
        audioState.ctx = new AudioCtx();
      }
      return audioState.ctx;
    }

    async function primeAudio() {
      const ctx = ensureAudioContext();
      if (!ctx) return;
      if (ctx.state === "suspended") {
        try {
          await ctx.resume();
        } catch (_) {}
      }
    }

    async function playShutterSound() {
      const ctx = ensureAudioContext();
      if (!ctx) return;

      if (ctx.state === "suspended") {
        try {
          await ctx.resume();
        } catch (_) {
          return;
        }
      }

      const now = ctx.currentTime;
      const master = ctx.createGain();
      master.gain.setValueAtTime(0.95, now);
      master.connect(ctx.destination);

      const click1 = ctx.createOscillator();
      click1.type = "triangle";
      click1.frequency.setValueAtTime(2100, now);

      const click1Gain = ctx.createGain();
      click1Gain.gain.setValueAtTime(0.0001, now);
      click1Gain.gain.linearRampToValueAtTime(0.14, now + 0.002);
      click1Gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.028);

      click1.connect(click1Gain);
      click1Gain.connect(master);
      click1.start(now);
      click1.stop(now + 0.03);

      const click2 = ctx.createOscillator();
      click2.type = "triangle";
      click2.frequency.setValueAtTime(1200, now + 0.038);

      const click2Gain = ctx.createGain();
      click2Gain.gain.setValueAtTime(0.0001, now + 0.038);
      click2Gain.gain.linearRampToValueAtTime(0.11, now + 0.042);
      click2Gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.085);

      click2.connect(click2Gain);
      click2Gain.connect(master);
      click2.start(now + 0.038);
      click2.stop(now + 0.09);

      const noiseBuffer = ctx.createBuffer(1, Math.floor(ctx.sampleRate * 0.10), ctx.sampleRate);
      const noiseData = noiseBuffer.getChannelData(0);
      for (let i = 0; i < noiseData.length; i += 1) {
        noiseData[i] = (Math.random() * 2 - 1) * (1 - i / noiseData.length);
      }

      const noise = ctx.createBufferSource();
      noise.buffer = noiseBuffer;

      const noiseFilter = ctx.createBiquadFilter();
      noiseFilter.type = "bandpass";
      noiseFilter.frequency.setValueAtTime(1800, now);
      noiseFilter.Q.setValueAtTime(0.8, now);

      const noiseGain = ctx.createGain();
      noiseGain.gain.setValueAtTime(0.0001, now);
      noiseGain.gain.linearRampToValueAtTime(0.08, now + 0.003);
      noiseGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.10);

      noise.connect(noiseFilter);
      noiseFilter.connect(noiseGain);
      noiseGain.connect(master);

      noise.start(now);
      noise.stop(now + 0.10);
    }
